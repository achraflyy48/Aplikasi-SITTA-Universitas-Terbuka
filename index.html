<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Bahan Ajar UT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <section id="login-page" class="w-full max-w-md animate-fade">
        <div class="bg-white p-10 rounded-3xl shadow-2xl border-t-8 border-[#003366]">
            <div class="text-center mb-10">
                <img src="assets/Logo UT (1).png" alt="Logo UT" class="mx-auto h-20 mb-6">
                <h2 class="text-3xl font-black text-[#003366]">Sistem Bahan Ajar</h2>
                <p class="text-gray-400 mt-2 text-sm">Masuk untuk akses UT-Daerah</p>
            </div>
            
            <form onsubmit="processLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
                    <input type="email" id="login-email" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#003366] focus:outline-none" placeholder="Email" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                    <input type="password" id="login-pass" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#003366] focus:outline-none" placeholder="Password" required>
                </div>
                <button type="submit" class="w-full bg-[#ffcc00] text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-900 transition transform active:scale-95">Masuk Sekarang</button>
            </form>

            <div class="mt-10 flex justify-between text-xs font-semibold">
                <button onclick="toggleModal('modal-forgot')" class="text-blue-600 hover:underline">Lupa Password?</button>
                <button onclick="toggleModal('modal-regis')" class="text-blue-600 hover:underline">Daftar Akun</button>
            </div>
        </div>
    </section>

    <!-- Modal Lupa Password -->
    <div id="modal-forgot" class="modal">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full mx-4 shadow-2xl text-center">
            <h3 class="text-xl font-bold mb-4">Lupa Password?</h3>
            <p class="text-gray-500 mb-8 text-sm">Hubungi IT Support UT Pusat untuk reset akses.</p>
            <button onclick="toggleModal('modal-forgot')" class="w-full bg-[#003366] text-white py-4 rounded-2xl font-bold">Tutup</button>
        </div>
    </div>

    <!-- Modal Daftar -->
    <div id="modal-regis" class="modal">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full mx-4 shadow-2xl text-center">
            <h3 class="text-xl font-bold mb-4">Pendaftaran Staf</h3>
            <p class="text-gray-500 mb-8 text-sm">Pendaftaran dilakukan melalui bagian Kepegawaian UPBJJ.</p>
            <button onclick="toggleModal('modal-regis')" class="w-full bg-[#003366] text-white py-4 rounded-2xl font-bold">Mengerti</button>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
